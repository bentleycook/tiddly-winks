project: tiddly-winks

issue_tracker:
  type: github
  repo: bentleycook/tiddly-winks

# Generic worker pool — workers are interchangeable slots.
# Task context is injected at dispatch time via `tw send`, not baked in.
# Supported formats:
#   workers: [dev-1, dev-2]              — name-only list
#   workers: {dev: {}, ops: {}}          — dict without roles
#   workers: {ci: {role: ci-watcher}}    — dict with initial context (legacy)
#   pool_size: 3                         — generates dev-1..dev-N
workers:
  - dev
  - ops

reviews:
  shell-correctness:
    prompt: .tw/reviews/shell-correctness.md
  concurrency:
    prompt: .tw/reviews/concurrency.md
  orchestration:
    prompt: .tw/reviews/orchestration.md
  security:
    prompt: .tw/reviews/security.md
  cli-ux:
    prompt: .tw/reviews/cli-ux.md
